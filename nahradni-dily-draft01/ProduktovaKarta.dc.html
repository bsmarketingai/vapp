<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<meta name="robots" content="noindex, nofollow, noarchive">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400..700&display=swap" rel="stylesheet">
<style>
  @media (max-width:900px){ .dt{display:none !important;} }
  html,body{margin:0;background:#F7F9FB;}
  body{padding:24px;}
  .h-card{transition:box-shadow .15s;} .h-card:hover{box-shadow:0 6px 20px rgba(20,47,86,.10) !important;}
  .h-buy:hover{background:#0B6937 !important;}
</style>
</helmet>
<div class="h-card" style="font-family:'Exo 2','Helvetica Neue',Arial,sans-serif;background:#fff;border-radius:8px;overflow:hidden;display:flex;flex-direction:column;transition:box-shadow .15s;cursor:pointer;height:100%;min-width:280px;max-width:300px;" style-hover="box-shadow:0 6px 20px rgba(20,47,86,.10);">
  <div onMouseEnter="{{ p.onEnter }}" onMouseLeave="{{ p.onLeave }}" style="position:relative;cursor:pointer;">
    <sc-if value="{{ p.img }}" hint-placeholder-val=""><div role="img" aria-label="{{ p.name }}" style="{{ p.imgBgStyle }}"></div></sc-if>
    <sc-if value="{{ p.noImg }}" hint-placeholder-val=""><div style="{{ p.phStyle }}">{{ p.imgLabel }}</div></sc-if>
    <sc-if value="{{ p.badge }}" hint-placeholder-val=""><span style="{{ p.badgeStyle }}">{{ p.badge }}</span></sc-if><span class="dt" style="position:absolute;top:8px;right:8px;display:flex;gap:4px;"><span style="{{ p.dot1 }}"></span><span style="{{ p.dot2 }}"></span></span>
  </div>
  <div style="padding:14px 16px 16px;display:flex;flex-direction:column;gap:14px;flex:1;">
    <div style="display:flex;flex-direction:column;gap:6px;">
      <div style="font-size:16px;font-weight:700;color:#15181C;line-height:1.3;min-height:42px;">{{ p.name }}</div>
      <div style="display:flex;align-items:center;gap:7px;">
        <span style="font-size:13px;letter-spacing:1.5px;"><span style="color:#F5A623;">{{ p.starsOn }}</span><span style="color:#D5DAE0;">{{ p.starsOff }}</span></span>
        <span style="font-size:13px;color:#7A828C;">({{ p.reviews }})</span>
      </div>
    </div>
    <div style="margin-top:auto;display:flex;align-items:flex-end;justify-content:space-between;gap:10px;">
      <span style="{{ p.availStyle }}"><sc-if value="{{ p.availIn }}" hint-placeholder-val=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.8 10A10 10 0 1 1 17 3.34"></path><path d="m9 11 3 3L22 4"></path></svg></sc-if><sc-if value="{{ p.availOut }}" hint-placeholder-val=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><path d="M12 17h.01"></path></svg></sc-if>{{ p.avail }}</span>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:2px;">
        <span style="font-size:17px;font-weight:700;color:#15181C;white-space:nowrap;">{{ p.priceNet }}</span>
        <span style="font-size:13px;color:#7A828C;white-space:nowrap;">{{ p.price }} s DPH</span>
      </div>
    </div>
    <div style="display:flex;align-items:stretch;gap:8px;">
      <div style="flex:none;display:flex;align-items:stretch;border-radius:6px;overflow:hidden;background:#F2F4F7;">
        <span onClick="{{ p.onMinus }}" style="width:30px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#5A626C;cursor:pointer;user-select:none;">−</span>
        <span style="min-width:28px;padding:0 6px;display:flex;align-items:center;justify-content:center;font-size:13.5px;font-weight:700;color:#15181C;background:#fff;border-top:1px solid #F2F4F7;border-bottom:1px solid #F2F4F7;">{{ p.qty }}</span>
        <span onClick="{{ p.onPlus }}" style="width:30px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#5A626C;cursor:pointer;user-select:none;">+</span>
      </div>
      <span class="h-buy" style="flex:1;display:flex;align-items:center;justify-content:center;gap:7px;min-height:42px;font-size:13.5px;font-weight:700;color:#fff;background:#0E7F43;border-radius:8px;cursor:pointer;transition:background .12s;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1.5"></circle><circle cx="19" cy="21" r="1.5"></circle><path d="M2 3h3l2.6 12.5a1 1 0 0 0 1 .8h9.7a1 1 0 0 0 1-.8L21.5 7H6"></path></svg>Koupit</span>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding-top:2px;">
      <span onClick="{{ p.onCmp }}" style="display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:#5A626C;cursor:pointer;min-height:24px;"><span style="{{ p.cmpBox }}"><sc-if value="{{ p.cmp }}" hint-placeholder-val=""><svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M3 8.5L6.2 11.5L13 4.5" stroke="#fff" stroke-width="2.8" stroke-linecap="round"></path></svg></sc-if></span>Porovnat</span>
      <span style="font-size:13px;color:#9AA1AB;">Obj. č.: {{ p.objNum }}</span>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:300,&quot;height&quot;:560},&quot;p&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;object&quot;,&quot;default&quot;:null}}">class Component extends DCLogic {
  state = { qty:1, cmp:false };
  renderVals(){
    if (this.props.p) return { p: this.props.p };
    const cmp = this.state.cmp;
    // Ukázková data pro samostatný náhled komponenty
    return { p: {
      name:'Opěrné kolečko ⌀48 mm, nosnost 150 kg', starsOn:'★★★★', starsOff:'★', reviews:23,
      img:'uploads/kolecko-operne-dtr-prum-48-150-kg.jpg',
      imgBgStyle:'aspect-ratio:4/3;background:#fff url("./uploads/kolecko-operne-dtr-prum-48-150-kg.jpg") center/contain no-repeat;background-origin:content-box;padding:18px 12px;',
      noImg:false, phStyle:'', imgLabel:'',
      badge:'−15 %', badgeStyle:'position:absolute;top:8px;left:8px;font-size:13px;font-weight:700;border-radius:6px;padding:4px 9px;color:#fff;background:#C5232B;',
      dot1:'display:none;', dot2:'display:none;',
      availStyle:'display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:#0B6937;', availIn:true, availOut:false, avail:'Skladem > 15 ks',
      priceNet:'397 Kč', price:'480 Kč', objNum:'404815',
      qty:this.state.qty, cmp,
      cmpBox:'flex:none;width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;border:1.5px solid '+(cmp?'#1E5AA8':'#C4CAD2')+';background:'+(cmp?'#1E5AA8':'#fff')+';',
      onMinus:()=>this.setState(s=>({qty:Math.max(1,s.qty-1)})),
      onPlus:()=>this.setState(s=>({qty:s.qty+1})),
      onCmp:()=>this.setState(s=>({cmp:!s.cmp})),
      onEnter:()=>{}, onLeave:()=>{},
    } };
  }
}</script>
</body>
</html>
